<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Исследовательский проект</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f7;
        }

        header {
            background: linear-gradient(135deg, #2c7a7b, #38a169);
            color: white;
            text-align: center;
            padding: 40px 20px;
            animation: fadeDown 1s ease;
        }

        section {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease forwards;
        }

        section:nth-child(2) { animation-delay: 0.3s; }
        section:nth-child(3) { animation-delay: 0.6s; }
        section:nth-child(4) { animation-delay: 0.9s; }

        h2 {
            color: #2c7a7b;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #2c7a7b;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #225e5f;
            transform: scale(1.05);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Влияние архитектуры на воздух и здоровье</h1>
    <p>Исследовательский проект</p>
</header>

<section>
    <h2>О проекте</h2>
    <p>
        Этот проект посвящён изучению влияния городской архитектуры 
        на качество воздуха и здоровье человека.
    </p>
</section>

<section>
    <h2>Проблема</h2>
    <p>
        Плотная застройка и большое количество транспорта ухудшают 
        качество воздуха в городе.
    </p>
</section>

<section>
    <h2>Оставьте своё мнение</h2>

    <form action="https://formspree.io/f/mqewlvln" method="POST">

        <label>Ваше имя:</label>
        <input type="text" name="name" required>

        <label>Ваше мнение:</label>
        <textarea name="message" rows="5" required></textarea>

        <button type="submit">Отправить</button>

    </form>
</section>

</body>
</html>
